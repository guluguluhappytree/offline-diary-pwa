<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#C4956A" />
    <meta name="description" content="全本地优先的离线日记，断网也能写" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="离线日记" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>离线日记</title>
    <style>
      html, body { margin: 0; background: #faf7f2; }
      #root { min-height: 100dvh; }
      .inline-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        color: #7a6e5d;
        font-family: system-ui, -apple-system, sans-serif;
        gap: 12px;
      }
      .inline-loader .spin {
        width: 32px; height: 32px;
        border: 3px solid #e8e0d4;
        border-top-color: #c4956a;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="inline-loader">
        <div class="spin"></div>
        <p>正在加载离线日记…</p>
      </div>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root && e.message) {
          root.innerHTML = '<div class="inline-loader"><p style="color:#c45c5c">加载失败，请检查网络后刷新</p><p style="font-size:14px">' + e.message + '</p></div>';
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
